<div id="custom-directory-app">

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
window.currentDirImages=[];window.currentDirIndex=0;window.allDirectoryData=[];window.catMap=new Map();
window.openDirectoryLightbox=function(i){const p=i.split('|||').filter(Boolean);if(p.length===0)return;window.currentDirImages=p;window.currentDirIndex=0;document.getElementById('dirLightboxImg').src=p[0];document.getElementById('dirImageLightbox').classList.add("show");const d=p.length>1?"block":"none";document.getElementById('dirLightboxPrev').style.display=d;document.getElementById('dirLightboxNext').style.display=d;};
window.closeDirectoryLightbox=function(){document.getElementById('dirImageLightbox').classList.remove("show");};
window.changeDirectorySlide=function(n){let i=window.currentDirImages||[];if(i.length===0)return;window.currentDirIndex+=n;if(window.currentDirIndex>=i.length)window.currentDirIndex=0;if(window.currentDirIndex<0)window.currentDirIndex=i.length-1;document.getElementById('dirLightboxImg').src=i[window.currentDirIndex];};document.addEventListener("DOMContentLoaded",function(){
Papa.parse("https://docs.google.com/spreadsheets/d/e/2PACX-1vSJy-xzoHUd_Mv8wL4fZNJW9PO7u2bPsanbYNAQX2dxjyd8I3K1ZFUb_pNAfPSgbmq6PKS1pwtILbVJ/pub?gid=462474319&single=true&output=csv",{download:true,header:true,skipEmptyLines:true,complete:function(r){window.allDirectoryData=r.data.filter(w=>{const n=w.Name?w.Name.trim():"";return n!==''&&!n.includes('NAMst')&&!n.includes('NAMend')&&n.toLowerCase()!=='mobile'&&n.toLowerCase()!=='test number'&&!n.startsWith('[');});document.getElementById('mainLoader').style.display='none';pI(window.allDirectoryData);},error:function(){document.getElementById('mainLoader').innerHTML='<span style="color:red">Error loading data.</span>';}});
